name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build-electron -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build-electron -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For code signing (optional)
          # CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build-electron -- --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: griphook-windows
          path: |
            dist/*.exe
            dist/*.msi

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: griphook-macos
          path: |
            dist/*.dmg
            dist/*.zip

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: griphook-linux
          path: |
            dist/*.AppImage
            dist/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            griphook-windows/*
            griphook-macos/*
            griphook-linux/*
          draft: false
          prerelease: false
          body: |
            ## Griphook Desktop v${{ github.ref_name }}
            
            🖥️ **Native Desktop Application for Azure Key Vault Management**
            
            ### Downloads
            - **Windows**: `.exe` (installer) or `.msi` (MSI package)
            - **macOS**: `.dmg` (disk image) or `.zip` (portable)
            - **Linux**: `.AppImage` (portable) or `.deb` (Debian package)
            
            ### Features
            - 🔐 Azure Key Vault secret management
            - ⚡ Batch operations for multiple secrets
            - 🛡️ Secure Azure AD authentication
            - 🎨 Modern, responsive interface
            - 🔄 Auto-update capability
            
            ### Installation
            1. Download the appropriate file for your OS
            2. Run the installer or extract the portable version
            3. Launch Griphook and authenticate with your Azure account
            4. Start managing your Azure Key Vault secrets!
            
            ### System Requirements
            - Windows 10/11, macOS 10.14+, or Linux (Ubuntu 18.04+)
            - Internet connection for Azure authentication
            - Azure subscription with Key Vault access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}