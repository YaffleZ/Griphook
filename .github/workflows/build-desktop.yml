name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            npm run build-electron -- --win --publish always
          else
            npm run build-electron -- --win
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            npm run build-electron -- --mac --publish always
          else
            npm run build-electron -- --mac
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For code signing (optional)
          # CSC_IDENTITY_AUTO_DISCOVERY: false

      # Linux build removed

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: griphook-windows
          path: |
            dist/*.msi
            dist/*.zip

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: griphook-macos
          path: |
            dist/*.dmg
            dist/*.zip

      # Linux artifact upload removed

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            griphook-windows/*
            griphook-macos/*
          draft: false
          prerelease: false
          body: |
            ## Griphook Desktop ${{ github.ref_name }}
            
            🖥️ **Native Desktop Application for Azure Key Vault Management**
            
            ### Downloads
            - **Windows**: `.msi` (installer) or `.zip` (portable archive)
            - **macOS**: `.dmg` (disk image) or `.zip` (portable)
            
            ### Features
            - 🔐 Azure Key Vault secret management
            - ⚡ Batch operations for multiple secrets
            - 🛡️ Secure Azure AD authentication
            - 🎨 Modern, responsive interface
            - 🔄 Auto-update capability (MSI installer only)
            
            ### Installation
            
            **Windows:**
            1. Download the `.msi` installer for automatic updates
            2. Run the installer and follow the prompts
            3. Launch Griphook from the Start Menu
            
            Alternatively, download the `.zip` for a portable version
            
            **macOS:**
            1. Download the `.dmg` or `.zip` file
            2. Mount the DMG or extract the ZIP
            3. Drag Griphook to Applications
            4. Launch Griphook and authenticate with your Azure account
            
            ### System Requirements
            - Windows 10/11 or macOS 10.14+
            - Internet connection for Azure authentication
            - Azure subscription with Key Vault access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}