name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: griphook-build
          path: |
            .next/
            package.json
            package-lock.json

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          body: |
            ## Griphook ${{ github.ref_name }}
            
            🌐 **Web Application for Azure Key Vault Management**
            
            ### Features
            - 🔐 Azure Key Vault secret management
            - ⚡ Batch operations for multiple secrets
            - 🛡️ Secure Azure AD authentication
            - 🎨 Modern, responsive interface
            - 🔒 AES-256-GCM encryption for local data
            
            ### Deployment
            This is a Next.js web application. Deploy using:
            - **Vercel**: `vercel deploy`
            - **Docker**: `docker-compose up -d`
            - **Self-hosted**: See README.md for instructions
            
            ### Requirements
            - Node.js 20+
            - Internet connection for Azure authentication
            - Azure subscription with Key Vault access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}