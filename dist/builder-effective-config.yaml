directories:
  output: dist
  buildResources: build
appId: com.griphook.keyvault-editor
productName: Griphook
copyright: Copyright © 2024
files:
  - filter:
      - electron/**/*
      - '!node_modules'
      - '!src'
      - '!.git'
      - '!.next'
extraResources:
  - from: .next/standalone
    to: standalone
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
win:
  sign: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: assets/icon.ico
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  perMachine: false
  runAfterFinish: true
  differentialPackage: false
portable:
  artifactName: Griphook-${version}-portable.exe
publish:
  provider: github
  owner: YaffleZ
  repo: Griphook
electronVersion: 33.4.11
